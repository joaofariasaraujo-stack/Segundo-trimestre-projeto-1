<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaTacado</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">ARENATACADO</div>

    <input
    type="text"
    id="search"
    placeholder="Buscar produto..."
    >

    <button id="cartBtn">
        🛒 Carrinho (<span id="cartCount">0</span>)
    </button>
</header>

<section class="hero">
    <h1>Equipamentos Profissionais para MMA</h1>
    <p>Os melhores acessórios para luta.</p>
</section>

<section class="products" id="products"></section>

<div class="cart-panel" id="cartPanel">

    <h2>Seu Carrinho</h2>

    <div id="cartItems"></div>

    <h3>
        Total: R$
        <span id="total">0.00</span>
    </h3>

    <h4>Pagamento</h4>

    <select>
        <option>PIX</option>
        <option>Cartão de Crédito</option>
        <option>Boleto</option>
    </select>

    <button class="checkout">
        Finalizar Compra
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
